appId: com.creditnorte.app
productName: CreditNorte
copyright: Copyright © 2026 CreditNorte

# Directorio de salida de los builds
directories:
  output: dist
  buildResources: assets

# Archivos a incluir en el build
files:
  - electron/**/*
  - package.json
  - "!node_modules/**/*"

# ─── Publicación en GitHub Releases ──────────────────────────────────────────
publish:
  provider: github
  owner: alexandernieves
  repo: credinorte
  private: false
  releaseType: release

# ─── Windows ──────────────────────────────────────────────────────────────────
win:
  target:
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: CreditNorte
  artifactName: "CreditNorte-Setup-${version}.exe"

# ─── macOS ─────────────────────────────────────────────────────────────────────
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.business
  artifactName: "CreditNorte-${version}-${arch}.dmg"

dmg:
  title: CreditNorte
  backgroundColor: "#0f172a"

