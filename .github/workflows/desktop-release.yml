name: 🖥️ Build & Publish Desktop Release

on:
  push:
    tags:
      - 'v*.*.*'    # Trigger en tags tipo v1.0.0, v1.2.3, etc.

jobs:
  build-desktop:
    name: Build Electron App (${{ matrix.platform }})
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: 📦 Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: 🏗️ Build & Publish Electron app (Windows)
        if: matrix.platform == 'win'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win

      - name: 🏗️ Build & Publish Electron app (macOS)
        if: matrix.platform == 'mac'
        working-directory: desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac

      - name: 📤 Upload Windows installer artifact
        if: matrix.platform == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: CreditNorte-Windows-${{ github.ref_name }}
          path: desktop/dist/*.exe
          if-no-files-found: warn

      - name: 📤 Upload macOS installer artifact
        if: matrix.platform == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: CreditNorte-macOS-${{ github.ref_name }}
          path: desktop/dist/*.zip
          if-no-files-found: warn


